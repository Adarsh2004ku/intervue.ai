name: Intervue.AI CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: intervue-ai-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GOOGLE_API_KEY: test-google-api-key
      GROQ_API_KEY: test-groq-api-key
      ELEVENLABS_API_KEY: test-elevenlabs-api-key
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: test-supabase-anon-key
      SUPABASE_SERVICE_KEY: test-supabase-service-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      JWT_SECRET: test-secret-32-characters-minimum
      REDIS_URL: redis://localhost:6379/0
      CELERY_ENABLED: "false"
      CELERY_TASK_ALWAYS_EAGER: "true"
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: test
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests -rs

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_WS_BASE_URL: ""

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            image: backend
            build_args: ""
          - name: frontend
            dockerfile: frontend/Dockerfile
            image: frontend
            build_args: |
              VITE_API_BASE_URL=/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repository}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - docker
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK"

      - name: Skip Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK == '' }}
        run: echo "RENDER_DEPLOY_HOOK is not configured; skipping Render deploy."

      - name: Validate Vercel secrets
        if: ${{ env.VERCEL_TOKEN != '' || env.VERCEL_ORG_ID != '' || env.VERCEL_PROJECT_ID != '' }}
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Set up Node.js for Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy frontend to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Skip Vercel deploy
        if: ${{ env.VERCEL_TOKEN == '' && env.VERCEL_ORG_ID == '' && env.VERCEL_PROJECT_ID == '' }}
        run: echo "Vercel secrets are not configured; skipping Vercel deploy."
