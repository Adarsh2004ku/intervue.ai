services:
  redis:
    image: redis:7-alpine
    container_name: intervue-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    container_name: intervue-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_ENABLED: "true"
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ai:/app/ai
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    container_name: intervue-worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_ENABLED: "true"
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ai:/app/ai
    command: celery -A backend.services.cache.celery_app.celery_app worker --loglevel=INFO --concurrency=2

  frontend:
    container_name: intervue-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis_data:
